<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Follow the Scheme Logo Mockups</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111111;
        --paper: #ffffff;
        --soft: #f3f1ed;
        --line: #d9d5ce;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--soft);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100vw - 40px));
        margin: 32px auto 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 0 0 28px;
        color: #55514a;
        font-size: 16px;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .concept {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px 72px;
        gap: 18px;
        align-items: center;
        padding: 18px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .logo-stage {
        display: grid;
        min-height: 190px;
        place-items: center;
        border: 1px solid var(--line);
        background: #ffffff;
      }

      .logo-stage img {
        display: block;
        width: min(100%, 720px);
        height: auto;
      }

      .small-stage,
      .favicon-stage {
        display: grid;
        height: 120px;
        place-items: center;
        border: 1px solid var(--line);
        background: #ffffff;
      }

      .small-stage img {
        width: 150px;
        height: auto;
      }

      .favicon-stage img {
        width: 42px;
        height: 42px;
        object-fit: cover;
        object-position: left center;
      }

      @media (max-width: 760px) {
        .concept {
          grid-template-columns: 1fr;
        }

        .small-stage,
        .favicon-stage {
          height: 92px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Logo Mockups</h1>
      <p>Monochrome-first explorations for Follow the Scheme. Each concept is designed to be recognizable without relying on color.</p>
      <section class="grid" aria-label="Logo concepts">
        <article class="concept">
          <div class="logo-stage"><img src="./fts-ligature.svg" alt="FTS ligature logo" /></div>
          <div class="small-stage"><img src="./fts-ligature.svg" alt="" /></div>
          <div class="favicon-stage"><img src="./fts-ligature.svg" alt="" /></div>
        </article>
        <article class="concept">
          <div class="logo-stage"><img src="./scheme-grid.svg" alt="Scheme grid logo" /></div>
          <div class="small-stage"><img src="./scheme-grid.svg" alt="" /></div>
          <div class="favicon-stage"><img src="./scheme-grid.svg" alt="" /></div>
        </article>
        <article class="concept">
          <div class="logo-stage"><img src="./mark-route.svg" alt="Mark route logo" /></div>
          <div class="small-stage"><img src="./mark-route.svg" alt="" /></div>
          <div class="favicon-stage"><img src="./mark-route.svg" alt="" /></div>
        </article>
      </section>
    </main>
  </body>
</html>
