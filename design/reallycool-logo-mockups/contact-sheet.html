<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>reallycool.lol Logo Mockups</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111111;
        --muted: #5c5c5c;
        --paper: #ffffff;
        --soft: #f4f4f1;
        --line: #d9d9d2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--soft);
        color: var(--ink);
        font-family: Avenir Next, Satoshi, Circular Std, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100vw - 40px));
        margin: 32px auto 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 780px;
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .concept {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 210px 86px;
        gap: 18px;
        align-items: center;
        padding: 18px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .stage {
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        background: #ffffff;
      }

      .logo-stage {
        min-height: 200px;
      }

      .logo-stage img {
        display: block;
        width: min(100%, 780px);
        height: auto;
      }

      .small-stage {
        height: 124px;
      }

      .small-stage img {
        width: 180px;
        height: auto;
      }

      .favicon-stage {
        height: 124px;
      }

      .favicon-stage img {
        width: 52px;
        height: 52px;
        object-fit: cover;
        object-position: left center;
      }

      .favicon-stage img.center-mark {
        object-position: 48% center;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 24px, 720px);
          margin-top: 20px;
        }

        .concept {
          grid-template-columns: 1fr;
        }

        .small-stage,
        .favicon-stage {
          height: 96px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>reallycool.lol logo mockups</h1>
      <p>Three monochrome-first logo directions. Each keeps the recognisable part in shape and rhythm, so color can be added later without carrying the identity.</p>
      <section class="grid" aria-label="Logo concepts">
        <article class="concept">
          <div class="stage logo-stage"><img src="./loop-wordmark.svg" alt="Loop wordmark logo" /></div>
          <div class="stage small-stage"><img src="./loop-wordmark.svg" alt="" /></div>
          <div class="stage favicon-stage"><img class="center-mark" src="./loop-wordmark.svg" alt="" /></div>
        </article>
        <article class="concept">
          <div class="stage logo-stage"><img src="./rcl-monogram.svg" alt="RCL monogram logo" /></div>
          <div class="stage small-stage"><img src="./rcl-monogram.svg" alt="" /></div>
          <div class="stage favicon-stage"><img src="./rcl-monogram.svg" alt="" /></div>
        </article>
        <article class="concept">
          <div class="stage logo-stage"><img src="./dot-lol.svg" alt="Dot lol logo" /></div>
          <div class="stage small-stage"><img src="./dot-lol.svg" alt="" /></div>
          <div class="stage favicon-stage"><img src="./dot-lol.svg" alt="" /></div>
        </article>
      </section>
    </main>
  </body>
</html>
