name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: follow-the-scheme-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: ${{ vars.DEPLOY_PATH || '/opt/follow-the-scheme' }}
      APP_BIND: ${{ vars.APP_BIND || '0.0.0.0' }}
      APP_PORT: ${{ vars.APP_PORT || '33200' }}
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'follow-the-scheme' }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || 'will' }}
      REMOTE_TMP_DIR: /tmp/follow-the-scheme-${{ github.run_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute image repository
        id: image
        run: echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:latest
            ${{ steps.image.outputs.repository }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Ensure remote app directory exists
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_DIR: ${{ env.APP_DIR }}
          REMOTE_TMP_DIR: ${{ env.REMOTE_TMP_DIR }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: APP_DIR,REMOTE_TMP_DIR
          script: |
            set -eu
            mkdir -p "${APP_DIR}"
            rm -rf "${REMOTE_TMP_DIR}"
            mkdir -p "${REMOTE_TMP_DIR}"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          source: docker-compose.yml
          target: ${{ env.REMOTE_TMP_DIR }}

      - name: Pull and restart container on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_BIND: ${{ env.APP_BIND }}
          APP_DIR: ${{ env.APP_DIR }}
          APP_PORT: ${{ env.APP_PORT }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          REMOTE_TMP_DIR: ${{ env.REMOTE_TMP_DIR }}
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: sha-${{ github.sha }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: APP_BIND,APP_DIR,APP_PORT,CONTAINER_NAME,REMOTE_TMP_DIR,IMAGE_REPOSITORY,IMAGE_TAG,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN
          script: |
            set -eu
            mv "$REMOTE_TMP_DIR/docker-compose.yml" "$APP_DIR/docker-compose.yml"
            rm -rf "$REMOTE_TMP_DIR"
            cd "$APP_DIR"

            if [ ! -f .env ]; then
              echo "::error::.env is missing at $APP_DIR/.env. Create or copy it on the server before deploying; this workflow will not write app secrets."
              exit 1
            fi

            cat > .deploy.env <<EOF
            IMAGE_REPOSITORY=$IMAGE_REPOSITORY
            IMAGE_TAG=$IMAGE_TAG
            APP_BIND=$APP_BIND
            APP_PORT=$APP_PORT
            CONTAINER_NAME=$CONTAINER_NAME
            EOF

            if [ -n "${GHCR_PULL_USERNAME}" ] && [ -n "${GHCR_PULL_TOKEN}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
            fi

            set -a
            . ./.deploy.env
            set +a

            mkdir -p data

            echo "Disk usage before Docker cleanup:"
            df -h /
            docker system df || true
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            echo "Disk usage after Docker cleanup:"
            df -h /
            docker system df || true

            docker compose pull
            docker compose run --rm app bunx prisma migrate deploy
            echo "Code deploy only: paper data is managed by local data releases."
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
