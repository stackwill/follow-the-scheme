name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: follow-the-scheme-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: ${{ vars.DEPLOY_PATH || '/opt/follow-the-scheme' }}
      APP_BIND: ${{ vars.APP_BIND || '127.0.0.1' }}
      APP_PORT: ${{ vars.APP_PORT || '33200' }}
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'follow-the-scheme' }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || '192.168.1.51' }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || 'will' }}
      REMOTE_TMP_DIR: /tmp/follow-the-scheme-${{ github.run_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute image repository
        id: image
        run: echo "repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:latest
            ${{ steps.image.outputs.repository }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Ensure remote app directory exists
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_DIR: ${{ env.APP_DIR }}
          REMOTE_TMP_DIR: ${{ env.REMOTE_TMP_DIR }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: APP_DIR,REMOTE_TMP_DIR
          script: |
            set -eu
            mkdir -p "${APP_DIR}"
            rm -rf "${REMOTE_TMP_DIR}"
            mkdir -p "${REMOTE_TMP_DIR}"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          source: docker-compose.yml
          target: ${{ env.REMOTE_TMP_DIR }}

      - name: Pull and restart container on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_BIND: ${{ env.APP_BIND }}
          APP_DIR: ${{ env.APP_DIR }}
          APP_PORT: ${{ env.APP_PORT }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          REMOTE_TMP_DIR: ${{ env.REMOTE_TMP_DIR }}
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: sha-${{ github.sha }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          envs: APP_BIND,APP_DIR,APP_PORT,CONTAINER_NAME,REMOTE_TMP_DIR,IMAGE_REPOSITORY,IMAGE_TAG,AUTH_PASSWORD,AUTH_SESSION_SECRET,OPENROUTER_API_KEY,OPENROUTER_MODEL,OPENROUTER_BASE_URL,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN
          script: |
            set -eu
            mv "$REMOTE_TMP_DIR/docker-compose.yml" "$APP_DIR/docker-compose.yml"
            rm -rf "$REMOTE_TMP_DIR"
            cd "$APP_DIR"

            if [ ! -f .env ]; then
              {
                printf 'AUTH_PASSWORD=%s\n' "$AUTH_PASSWORD"
                printf 'AUTH_SESSION_SECRET=%s\n' "$AUTH_SESSION_SECRET"
                if [ -n "${OPENROUTER_API_KEY}" ]; then
                  printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER_API_KEY"
                fi
                if [ -n "${OPENROUTER_MODEL}" ]; then
                  printf 'OPENROUTER_MODEL=%s\n' "$OPENROUTER_MODEL"
                fi
                if [ -n "${OPENROUTER_BASE_URL}" ]; then
                  printf 'OPENROUTER_BASE_URL=%s\n' "$OPENROUTER_BASE_URL"
                elif [ -n "${OPENROUTER_API_KEY}" ]; then
                  printf 'OPENROUTER_BASE_URL=https://openrouter.ai/api/v1\n'
                fi
              } > .env
              chmod 600 .env
              if [ -z "${AUTH_PASSWORD}" ] || [ -z "${AUTH_SESSION_SECRET}" ]; then
                echo "::warning::.env was missing on the server. A placeholder was created at $APP_DIR/.env; fill AUTH_PASSWORD and AUTH_SESSION_SECRET before using the app."
              fi
            fi

            cat > .deploy.env <<EOF
            IMAGE_REPOSITORY=$IMAGE_REPOSITORY
            IMAGE_TAG=$IMAGE_TAG
            APP_BIND=$APP_BIND
            APP_PORT=$APP_PORT
            CONTAINER_NAME=$CONTAINER_NAME
            EOF

            if [ -n "${GHCR_PULL_USERNAME}" ] && [ -n "${GHCR_PULL_TOKEN}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
            fi

            set -a
            . ./.deploy.env
            set +a

            mkdir -p data
            BOOTSTRAP_IMPORTS=0
            if [ ! -f data/app.db ]; then
              BOOTSTRAP_IMPORTS=1
            fi

            docker compose pull
            docker compose run --rm app bunx prisma migrate deploy
            if [ "$BOOTSTRAP_IMPORTS" = "1" ]; then
              docker compose run --rm app bun run fixtures:fetch
              docker compose run --rm app bun run import:smoke
            fi
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
